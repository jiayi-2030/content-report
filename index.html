<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容分析周报</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#f7f8fa;--surface:#fff;--border:#e5e6eb;--border-light:#f0f1f4;--text:#1f2329;--text2:#646a73;--text3:#8f959e;--accent:#3370ff;--accent-bg:#f0f4ff;--sw:260px;--tab-h:44px}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:68px}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.8;font-size:14.5px;-webkit-font-smoothing:antialiased}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;scrollbar-width:thin;scrollbar-color:#ddd transparent}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:#d9d9d9;border-radius:4px}
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border-light)}
.sidebar-header h1{font-size:15px;font-weight:700}
.sidebar-header .meta{font-size:11.5px;color:var(--text3);margin-top:3px}
.book-toc-panel{overflow-y:auto}
.book-toc-body{padding:8px 0}
.toc-section{margin-bottom:1px}
.toc-parent{display:flex;align-items:flex-start;padding:5px 16px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-decoration:none;transition:background .12s;gap:4px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toc-parent:hover{background:var(--bg)}
.toc-parent.active{color:var(--accent);background:var(--accent-bg)}
.toc-parent-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toc-arrow{width:14px;height:14px;flex-shrink:0;margin-top:1px;transition:transform .2s;color:var(--text3)}
.toc-arrow-ph{width:14px;display:inline-block;flex-shrink:0}
.toc-section.collapsed .toc-arrow{transform:rotate(-90deg)}
.toc-section.collapsed .toc-children{display:none}
.toc-child{display:block;padding:3px 16px 3px 34px;font-size:12px;color:var(--text2);text-decoration:none;transition:all .12s;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toc-child:hover{background:var(--bg);color:var(--text)}
.toc-child.active{color:var(--accent);background:var(--accent-bg);font-weight:500}
.tab-bar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 48px;margin-left:var(--sw);height:var(--tab-h);gap:0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tab-item{padding:10px 20px;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;text-decoration:none;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab-item:hover{color:var(--text)}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.main{margin-left:var(--sw);min-height:100vh;padding:24px 48px 80px}
.content{max-width:780px;margin:0 auto}
.content h1{font-size:24px;font-weight:700;margin-bottom:6px}
.content h2{font-size:19px;font-weight:700;margin-top:48px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--text)}
.content h3{font-size:16px;font-weight:600;margin-top:32px;margin-bottom:10px}
.content h4{font-size:15px;font-weight:600;margin-top:28px;margin-bottom:8px}
.content p{margin-bottom:12px}
.content strong{font-weight:600}
.content hr{border:none;border-top:1px solid var(--border);margin:36px 0}
.content ul,.content ol{padding-left:22px;margin-bottom:12px}
.content li{margin-bottom:4px}
.content em{color:var(--text2)}
hr.book-divider{border:none;border-top:3px solid var(--accent);margin:64px 0 40px;opacity:.2}
.table-wrap{overflow-x:auto;margin:14px 0 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface)}
.content table{width:100%;border-collapse:collapse;font-size:13px;line-height:1.6}
.content thead th{background:#f8f9fb;font-weight:600;font-size:12px;color:var(--text2);padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:0}
.content td{padding:7px 12px;border-bottom:1px solid var(--border-light);vertical-align:top}
.content tbody tr:last-child td{border-bottom:none}
.content tbody tr:hover{background:#f8f9fb}
.content pre{background:#f5f5f4;border-radius:8px;padding:14px 18px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;margin:14px 0;border:1px solid var(--border)}
.content code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:#f0f1f4;padding:1px 4px;border-radius:3px}
.content pre code{background:none;padding:0}
.choice-card{background:white;border:1px solid #e1e8ed;border-radius:10px;margin:8px 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03);transition:box-shadow .3s}
.choice-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.07)}
.choice-header{background:linear-gradient(135deg,#f5f7fa 0%,#fff 100%);padding:12px 16px;border-bottom:1px solid #e9ecef}
.choice-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:0;flex-wrap:wrap;gap:6px}
.choice-number{background:#ff6b4a;color:white;padding:2px 10px;border-radius:20px;font-weight:600;font-size:13px}
.choice-chapter{background:#007bff;color:white;padding:2px 8px;border-radius:5px;font-size:12px;margin-left:6px}
.choice-stats{display:flex;gap:12px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;align-items:center}
.stat-label{font-size:10px;color:#6c757d;text-transform:uppercase}
.stat-value{font-size:16px;font-weight:700;color:#dc3545}
.choice-context{margin-top:8px;font-size:12.5px;color:#8c939a;line-height:1.5}
.context-label{display:inline;background:#e8e9ec;color:#646a73;padding:1px 6px;border-radius:3px;font-size:11px;margin-right:4px}
.context-text{display:inline}
.choice-body{padding:12px 16px}
.choice-title{margin-bottom:8px}
.choice-title-en{font-size:15px;color:#2c3e50;font-weight:500;margin-bottom:2px}
.choice-title-zh{font-size:13px;color:#6c757d}
.choice-options-container{padding:0}
.choice-option-item{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f1f3f5}
.choice-option-item:last-child{border-bottom:none}
.option-icon{width:28px;font-size:18px;text-align:center;flex-shrink:0}
.option-content{flex:1;padding:0 10px;min-width:0}
.choice-option-en{font-size:14px;margin-bottom:1px}
.choice-option-zh{font-size:12px;color:#6c757d}
.choice-paid .choice-option-en{color:#dc3545;font-weight:500}
.choice-free .choice-option-en{color:#28a745;font-weight:500}
.option-percent{width:44px;text-align:right;font-weight:700;font-size:15px;color:#495057;flex-shrink:0}
.option-bar{width:120px;height:20px;background:#e9ecef;border-radius:10px;overflow:hidden;margin-left:12px;flex-shrink:0}
.option-fill{height:100%;background:linear-gradient(90deg,#ff6b4a,#ff9b80);border-radius:10px}
.option-fill.free{background:linear-gradient(90deg,#28a745,#5cb85c)}
.mobile-menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:200;width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:90}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 16px rgba(0,0,0,.1);width:280px}
.sidebar.open{transform:translateX(0)}.mobile-overlay.open{display:block}.mobile-menu-btn{display:flex}
.tab-bar{margin-left:0;padding:0 16px}.main{margin-left:0;padding:24px 16px 60px}
.content table{font-size:12px}.content td,.content thead th{padding:6px 8px}
.option-bar{width:60px}.choice-meta{flex-direction:column}
}
</style></head><body>
<!-- Full HTML content here - truncated for brevity -->
</body></html>
